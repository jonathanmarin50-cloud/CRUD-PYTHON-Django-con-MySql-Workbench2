<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GestiónPedidos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --login-card-bg: #ffffff;
            --accent: #0d6efd;
            --text-main: #212529;
            --text-muted: #6c757d;
        }

        body {
            background-color: var(--primary-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--login-card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border: 1px solid rgba(0,0,0,0.08);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .login-logo {
            width: 70px;
            height: 70px;
            background: #f1f3f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo i {
            font-size: 2rem;
            color: var(--accent);
        }

        .login-brand h2 {
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .btn-primary-custom {
            width: 100%;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }
        
        .form-control:focus {
            border-color: #86b7fe;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .django-form p {
            margin-bottom: 1rem;
        }

        .django-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.875em;
        }

        .django-form input {
            display: block;
            width: 100%;
            padding: 10px 15px;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text-main);
            background-color: var(--login-card-bg);
            background-clip: padding-box;
            border: 1px solid #dee2e6;
            appearance: none;
            border-radius: 6px;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }

        .django-form input:focus {
            color: #212529;
            background-color: #fff;
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        
        .django-form .helptext {
            display: block;
            margin-top: 0.25rem;
            font-size: 0.775em;
            color: var(--text-muted);
        }
        
        ul.errorlist {
            color: #dc3545;
            font-size: 0.85em;
            list-style-type: none;
            padding-left: 0;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="login-logo-container">
                <div class="login-logo">
                    <i class="bi bi-person-plus"></i>
                </div>
            </div>
            <h2>Crear Cuenta</h2>
            <p class="text-muted small mt-2">Completa el formulario para registrarte</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-center" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        {% endif %}

        <form method="post" class="django-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-primary-custom mt-3">Registrarse</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted small">¿Ya tienes una cuenta?</span>
            <a href="{% url 'login' %}" class="text-decoration-none fw-bold small ms-1">Iniciar Sesión</a>
        </div>
    </div>
</body>
</html>
