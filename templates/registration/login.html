<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - GestiónPedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 25px;
        }
        .login-brand h2 {
            color: #212529;
            font-weight: bold;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-primary-custom {
            background-color: #007bff;
            border: none;
            width: 100%;
            padding: 10px;
            font-weight: bold;
        }
        .btn-primary-custom:hover {
            background-color: #0056b3;
        }
        /* Ojito para la contraseña */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-toggle-btn {
            position: absolute;
            right: 12px;
            background: transparent;
            border: none;
            color: #6c757d;
            cursor: pointer;
        }
        .password-wrapper input {
            padding-right: 40px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <style>
            .login-logo-container {
                display: flex;
                justify-content: center;
                margin-bottom: 15px;
            }
            .login-logo {
                background: #e9ecef;
                width: 80px;
                height: 80px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                color: #007bff;
                font-size: 2.5rem;
            }
        </style>
        
        <div class="login-brand">
            <div class="login-logo-container">
                <div class="login-logo">
                    <i class="bi bi-person-lock"></i>
                </div>
            </div>
            <h2>GestiónPedidos</h2>
            <p class="text-muted small mt-2">Por favor, inicie sesión para continuar</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> Usuario o contraseña incorrectos.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_username" class="form-label text-muted fw-bold small">Nombre de usuario</label>
                <input type="text" name="username" class="form-control" autofocus required id="id_username">
            </div>
            
            <div class="mb-4">
                <label for="id_password" class="form-label text-muted fw-bold small">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" name="password" class="form-control" required id="id_password">
                    <button type="button" class="password-toggle-btn" id="togglePassword">
                        <i class="bi bi-eye-slash-fill"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-primary-custom">Iniciar Sesión</button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <div class="text-center mt-4">
            <span class="text-muted small">¿No tienes sistema aún?</span>
            <a href="{% url 'registro' %}" class="text-decoration-none fw-bold small ms-1">Regístrate gratis</a>
        </div>
    </div>

    <script>
        // Script para el ojito de la contraseña
        document.getElementById('togglePassword').addEventListener('click', function() {
            var passwordInput = document.getElementById('id_password');
            var icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye-slash-fill');
                icon.classList.add('bi-eye-fill');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-fill');
                icon.classList.add('bi-eye-slash-fill');
            }
        });
    </script>
</body>
</html>
